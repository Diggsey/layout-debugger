<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  .container { width: 400px; font-size: 16px; line-height: 1.5; }
  .ib { display: inline-block; width: 120px; height: 60px; }
  .ib-auto { display: inline-block; padding: 10px; }
</style>
</head>
<body>
  <div class="container" data-testid="container">
    <span data-testid="inline-span">hello</span>
    <div class="ib" data-testid="ib-explicit">inline-block</div>
    <div class="ib-auto" data-testid="ib-auto">auto</div>
  </div>
  <script src="../../dist/layout-debugger.js"></script>
</body>
</html>
