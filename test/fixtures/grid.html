<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  .grid { display: grid; grid-template-columns: 1fr 2fr; width: 300px; gap: 0px; }
  .grid-item { height: 40px; }

  .grid-gap { display: grid; grid-template-columns: 100px 100px 100px; width: 320px; gap: 10px; }
  .grid-span { grid-column: 1 / 3; height: 40px; }
</style>
</head>
<body>
  <div class="grid" data-testid="grid">
    <div class="grid-item" data-testid="grid-1fr">1fr</div>
    <div class="grid-item" data-testid="grid-2fr">2fr</div>
  </div>

  <div class="grid-gap" data-testid="grid-gap">
    <div class="grid-item" data-testid="gap-item">item</div>
    <div class="grid-item" data-testid="gap-item2">item2</div>
    <div class="grid-item" data-testid="gap-item3">item3</div>
    <div class="grid-span" data-testid="span-item">spans 1-2</div>
    <div class="grid-item" data-testid="gap-item4">item4</div>
  </div>

  <script src="../../dist/layout-debugger.js"></script>
</body>
</html>
